# Requirement #5 - Load Distribution
# Strategy: least_conn (Least Connections)
# Rationale: better than round-robin for long-lived requests (e.g., synchronous invoice generation)
# because it routes new requests to the instance with the fewest active connections,
# preventing one instance from being overloaded while the other is idle.

upstream laravel_backend {
    least_conn;
    server app1:8000;
    server app2:8000;
}

server {
    listen 80;
    server_name _;

    # Pass X-App-Server header so you can see which instance handled the request
    add_header X-Upstream-Server $upstream_addr always;

    location / {
        proxy_pass         http://laravel_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
    }
}
