version: '3.8'

# Requirement #5 - Load Distribution
# Architecture: nginx (least_conn) → app1 + app2 (Laravel + Octane/Swoole)
# Shared infrastructure: mysql + redis (single source of truth for all instances)

services:

  # Instance 1
  app1:
    build: .
    container_name: laravel_app1
    restart: unless-stopped
    # Override CMD to allow changing --workers without rebuild
    # For k6 load test: change OCTANE_WORKERS to 8 or 12, then restart
    command: php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 --workers=${OCTANE_WORKERS:-4}
    volumes:
      - .:/var/www/html
      # Preserve vendor built during image build (never overwrite with local vendor)
      - app1_vendor:/var/www/html/vendor
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      OCTANE_SERVER: swoole
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: "525600"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network

  # Instance 2 — identical to app1; nginx distributes load between both
  app2:
    build: .
    container_name: laravel_app2
    restart: unless-stopped
    command: php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 --workers=${OCTANE_WORKERS:-4}
    volumes:
      - .:/var/www/html
      - app2_vendor:/var/www/html/vendor
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      OCTANE_SERVER: swoole
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: "525600"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network

  # Queue worker — processes GenerateInvoiceJob and ProcessDailySalesReportJob
  queue_worker:
    build: .
    container_name: laravel_queue_worker
    restart: unless-stopped
    command: php artisan queue:work redis --tries=3 --timeout=120 --sleep=1
    volumes:
      - .:/var/www/html
      - queue_vendor:/var/www/html/vendor
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network

  # Dev-only: watches PHP files and auto-reloads Octane workers on change
  # Usage: docker compose --profile dev up -d
  watcher:
    image: alpine:3.19
    container_name: laravel_watcher
    profiles: [dev]
    restart: unless-stopped
    volumes:
      - .:/var/www/html:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/watcher/watch.sh:/watch.sh:ro
    command: sh /watch.sh
    depends_on:
      - app1
      - app2
    networks:
      - app_network

  # Requirement #5 - Load Balancer (least_conn strategy)
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - app_network

  # Shared Redis — cache + queue + sessions for all instances
  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    networks:
      - app_network

  # Shared MySQL — single database for all instances
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      # MYSQL_USER/MYSQL_PASSWORD removed: cannot create a user named 'root' via MYSQL_USER
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
  app1_vendor:
  app2_vendor:
  queue_vendor:
